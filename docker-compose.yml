services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-labsmith}
      POSTGRES_USER: ${POSTGRES_USER:-labsmith}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labsmith}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    # CadQuery/OCP publishes Linux x86_64 wheels, but not Linux ARM64 wheels.
    # Pin the backend image so Apple Silicon local builds match deploy reality.
    platform: linux/amd64
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LABSMITH_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-labsmith}:${POSTGRES_PASSWORD:-labsmith}@postgres:5432/${POSTGRES_DB:-labsmith}
      LABSMITH_DEBUG: "false"
      LABSMITH_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      LABSMITH_STORAGE_BACKEND: local
      LABSMITH_STORAGE_DIR: /app/backend/storage
      LABSMITH_LAB_DOCUMENT_MAX_BYTES: ${LABSMITH_LAB_DOCUMENT_MAX_BYTES:-1000000}
      LABSMITH_CHAT_MOCK: "true"
      LABSMITH_CHAT_RATE_LIMIT_REQUESTS: ${LABSMITH_CHAT_RATE_LIMIT_REQUESTS:-30}
      LABSMITH_CHAT_RATE_LIMIT_WINDOW_SECONDS: ${LABSMITH_CHAT_RATE_LIMIT_WINDOW_SECONDS:-60}
      LABSMITH_SSE_KEEPALIVE_INTERVAL_SECONDS: ${LABSMITH_SSE_KEEPALIVE_INTERVAL_SECONDS:-15}
      LABSMITH_CHAT_LLM_PROVIDER: ${LABSMITH_CHAT_LLM_PROVIDER:-mock}
      LABSMITH_SPEC_EXTRACTOR: ${LABSMITH_SPEC_EXTRACTOR:-rule_based}
      LABSMITH_OPENAI_API_KEY: ${LABSMITH_OPENAI_API_KEY:-}
      LABSMITH_OPENAI_CHAT_MODEL: ${LABSMITH_OPENAI_CHAT_MODEL:-gpt-4o-mini}
      LABSMITH_OPENAI_EXTRACTION_MODEL: ${LABSMITH_OPENAI_EXTRACTION_MODEL:-gpt-4o-mini}
      LABSMITH_CLERK_SECRET_KEY: ${LABSMITH_CLERK_SECRET_KEY:-}
      LABSMITH_CLERK_PUBLISHABLE_KEY: ${LABSMITH_CLERK_PUBLISHABLE_KEY:-}
      LABSMITH_CLERK_WEBHOOK_SECRET: ${LABSMITH_CLERK_WEBHOOK_SECRET:-}
      LABSMITH_CLERK_JWKS_URL: ${LABSMITH_CLERK_JWKS_URL:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_storage:/app/backend/storage
    command: >
      sh -c "cd backend
      && python -m alembic upgrade head
      && cd /app
      && python -m uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  backend_storage:
